<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;background:#f5f5f3;color:#1a1a18;min-height:100vh;padding:1rem}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}

/* CSS variable fallbacks for standalone use */
:root{
  --color-background-primary:#ffffff;
  --color-background-secondary:#f5f5f3;
  --color-background-tertiary:#ebebea;
  --color-background-info:#e6f1fb;
  --color-background-success:#eaf3de;
  --color-background-warning:#faeeda;
  --color-background-danger:#fcebeb;
  --color-text-primary:#1a1a18;
  --color-text-secondary:#6b6b68;
  --color-text-tertiary:#9b9b97;
  --color-text-info:#0c447c;
  --color-text-success:#27500a;
  --color-text-warning:#633806;
  --color-text-danger:#a32d2d;
  --color-border-tertiary:rgba(0,0,0,0.12);
  --color-border-secondary:rgba(0,0,0,0.22);
  --color-border-primary:rgba(0,0,0,0.32);
  --border-radius-md:8px;
  --border-radius-lg:12px;
  --border-radius-xl:16px;
  --font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;
}

@media(prefers-color-scheme:dark){
  :root{
    --color-background-primary:#1e1e1c;
    --color-background-secondary:#2a2a28;
    --color-background-tertiary:#333330;
    --color-background-info:#042c53;
    --color-background-success:#173404;
    --color-background-warning:#412402;
    --color-background-danger:#501313;
    --color-text-primary:#e8e8e4;
    --color-text-secondary:#9b9b97;
    --color-text-tertiary:#6b6b68;
    --color-text-info:#85b7eb;
    --color-text-success:#c0dd97;
    --color-text-warning:#fac775;
    --color-text-danger:#f09595;
    --color-border-tertiary:rgba(255,255,255,0.1);
    --color-border-secondary:rgba(255,255,255,0.18);
    --color-border-primary:rgba(255,255,255,0.28);
  }
}

.app-wrap{max-width:720px;margin:0 auto;background:var(--color-background-tertiary);border-radius:var(--border-radius-xl);padding:1.25rem}
.app-title{font-size:16px;font-weight:500;color:var(--color-text-primary);margin-bottom:1.25rem;text-align:center}
.tab-bar{display:flex;gap:0;margin-bottom:1.5rem;border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);border-radius:var(--border-radius-lg) var(--border-radius-lg) 0 0;padding:0 8px}
.tab{padding:10px 16px;border:none;background:none;cursor:pointer;font-size:13px;color:var(--color-text-secondary);border-bottom:2px solid transparent;margin-bottom:-0.5px;transition:color .15s}
.tab.active{color:var(--color-text-primary);border-bottom-color:var(--color-text-primary);font-weight:500}
.tab-content{background:var(--color-background-primary);border-radius:0 0 var(--border-radius-lg) var(--border-radius-lg);padding:1.25rem;min-height:400px}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:12px}
.btn{padding:8px 16px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);cursor:pointer;font-size:13px;font-weight:500;color:var(--color-text-primary);transition:all .15s}
.btn:hover{background:var(--color-background-secondary)}
.btn-blue{background:#378ADD;border-color:#378ADD;color:#fff}
.btn-blue:hover{background:#185FA5}
.btn-sm{padding:5px 12px;font-size:12px}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:var(--border-radius-md)}
.badge-review{background:#FAEEDA;color:#633806}
.badge-exam{background:#FCEBEB;color:#A32D2D}
.badge-day{background:#E6F1FB;color:#0C447C}
.badge-done{background:#EAF3DE;color:#27500A}
.progress-bar{height:5px;background:var(--color-background-secondary);border-radius:3px;margin:6px 0}
.progress-fill{height:100%;border-radius:3px;background:#378ADD;transition:width .4s}
.day-scroll{display:grid;grid-template-columns:repeat(auto-fill,minmax(62px,1fr));gap:5px;margin-bottom:1rem}
.day-cell{padding:7px 4px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:var(--color-background-primary);font-size:11px;cursor:pointer;text-align:center;color:var(--color-text-secondary);transition:all .15s;line-height:1.3}
.day-cell:hover{border-color:var(--color-border-secondary)}
.day-cell.active{border-color:#378ADD;color:#0C447C;background:#E6F1FB}
.day-cell.done{background:#EAF3DE;border-color:#639922;color:#27500A}
.day-cell.review-cell{background:#FAEEDA;border-color:#BA7517;color:#633806}
.day-cell.review-cell.done{background:#EAF3DE;border-color:#639922;color:#27500A}
.day-cell.exam-cell{background:#FCEBEB;border-color:#E24B4A;color:#A32D2D}
.day-cell.exam-cell.done{background:#EAF3DE;border-color:#639922;color:#27500A}
.word-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:0.5px solid var(--color-border-tertiary)}
.word-row:last-child{border-bottom:none}
.wnum{font-size:11px;color:var(--color-text-secondary);min-width:22px}
.wen{font-weight:500;font-size:14px;flex:1;color:var(--color-text-primary)}
.wzh{font-size:13px;color:var(--color-text-secondary)}
.wpos{font-size:11px;color:var(--color-text-secondary);min-width:28px;text-align:right}
.quiz-box{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:12px}
.fill-input{width:100%;padding:9px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:14px;background:var(--color-background-primary);color:var(--color-text-primary)}
.fill-input:focus{outline:none;border-color:#378ADD}
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.mi{padding:9px 12px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);cursor:pointer;font-size:13px;background:var(--color-background-primary);color:var(--color-text-primary);text-align:center;transition:all .15s}
.mi.sel{border-color:#378ADD;background:#E6F1FB;color:#0C447C}
.mi.ok{border-color:#639922;background:#EAF3DE;color:#27500A;cursor:default}
.mi.bad{border-color:#E24B4A;background:#FCEBEB;color:#A32D2D}
.res-ok{background:#EAF3DE;color:#27500A;padding:8px 12px;border-radius:var(--border-radius-md);font-size:13px;margin-top:6px}
.res-bad{background:#FCEBEB;color:#A32D2D;padding:8px 12px;border-radius:var(--border-radius-md);font-size:13px;margin-top:6px}
.mc-opt{padding:9px 14px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);cursor:pointer;font-size:13px;background:var(--color-background-primary);color:var(--color-text-primary);margin-bottom:6px;transition:all .15s;display:block;width:100%;text-align:left}
.mc-opt:hover{background:var(--color-background-secondary)}
.mc-opt.ok{border-color:#639922;background:#EAF3DE;color:#27500A}
.mc-opt.bad{border-color:#E24B4A;background:#FCEBEB;color:#A32D2D}
.mc-opt.reveal{border-color:#639922;background:#EAF3DE;color:#27500A}
.hist-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:0.5px solid var(--color-border-tertiary)}
.hist-row:last-child{border-bottom:none}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.stat-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px;text-align:center}
.stat-n{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.stat-l{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.month-label{font-size:12px;font-weight:500;color:var(--color-text-secondary);padding:8px 0 4px;border-bottom:0.5px solid var(--color-border-tertiary);margin-bottom:8px}
</style>
</head>

function dedupe(a){const s=new Set(),r=[];for(const w of a){const k=w[0];if(!s.has(k)){s.add(k);r.push(w);}}return r;}
const WW=dedupe(WORDS);
const PER_DAY=15;

function wordsForDay(d){return WW.slice((d-1)*PER_DAY,d*PER_DAY);}
function wordsForRange(d1,d2){return WW.slice((d1-1)*PER_DAY,d2*PER_DAY);}

function buildSchedule(){
  const items=[];let reviewN=0;
  for(let m=0;m<3;m++){
    const start=m*30+1;
    for(let d=start;d<=start+29;d++){
      items.push({type:'day',day:d,month:m+1});
      if((d-start+1)%5===0&&d<start+29){
        reviewN++;
        items.push({type:'review',n:reviewN,dayRange:[d-4,d],month:m+1});
      }
    }
    items.push({type:'exam',month:m+1,dayRange:[start,start+29]});
  }
  return items;
}
const SCHEDULE=buildSchedule();

// ── Fallback sentence generator for words without a hand-written entry ──
// Picks a grammatically-appropriate template based on part of speech.
// Deterministic per word (hash-based) so the same word always gets the
// same sentence within a session, but varies across the word list.
function hashStr(s){let h=0;for(let i=0;i<s.length;i++){h=(h*31+s.charCodeAt(i))|0;}return Math.abs(h);}

function genSentence(word,pos){
  const w=word.toLowerCase();
  let pool;
  if(pos.startsWith('n')) pool=TEMPLATES_N;
  else if(pos.startsWith('v')) pool=TEMPLATES_V;
  else if(pos.startsWith('adj')) pool=TEMPLATES_ADJ;
  else if(pos.startsWith('adv')) pool=TEMPLATES_ADV;
  else if(pos.startsWith('prep')) pool=TEMPLATES_PREP;
  else if(pos.startsWith('conj')) pool=TEMPLATES_CONJ;
  else if(pos.startsWith('pron')) pool=TEMPLATES_N;
  else pool=TEMPLATES_N;
  const idx=hashStr(w)%pool.length;
  return pool[idx];
}

let S={tab:'plan',currentIdx:0,completed:{},quizState:null,studentName:''};

// ══════════════════════════════════════════════════════════════
//  STORAGE: Name-based login + localStorage + URL hash (3 layers)
//  Student enters name once → stored in localStorage
//  Every save writes to: localStorage[name] + URL hash
//  On open: checks URL hash first, then localStorage by name
//  Result: progress survives browser clears, device changes,
//  as long as student uses same name OR their saved URL link
// ══════════════════════════════════════════════════════════════

function enc(obj){try{return btoa(unescape(encodeURIComponent(JSON.stringify(obj))));}catch(e){return '';}}
function dec(s){try{return JSON.parse(decodeURIComponent(escape(atob(s))));}catch(e){return null;}}
function nameKey(n){return 'gept6_'+(n||'').trim().toLowerCase().replace(/\s+/g,'_');}

function save(){
  if(!S.studentName)return;
  const data={completed:S.completed,name:S.studentName,ts:Date.now()};
  try{localStorage.setItem(nameKey(S.studentName),JSON.stringify(data));}catch(e){}
  try{sessionStorage.setItem(nameKey(S.studentName),JSON.stringify(data));}catch(e){}
  try{history.replaceState(null,'',location.pathname+'#u='+encodeURIComponent(S.studentName)+'&d='+enc(S.completed));}catch(e){}
}

function loadFromHash(){
  try{
    const h=location.hash;
    if(!h.startsWith('#u='))return false;
    const parts=h.slice(1).split('&');
    const uPart=parts.find(p=>p.startsWith('u='));
    const dPart=parts.find(p=>p.startsWith('d='));
    if(!uPart||!dPart)return false;
    const name=decodeURIComponent(uPart.slice(2));
    const data=dec(dPart.slice(2));
    if(!data||!name)return false;
    S.studentName=name;
    S.completed=data||{};
    // write back to localStorage
    try{localStorage.setItem(nameKey(name),JSON.stringify({completed:S.completed,name,ts:Date.now()}));}catch(e){}
    return true;
  }catch(e){return false;}
}

function loadFromStorage(name){
  try{
    const k=nameKey(name);
    const d=localStorage.getItem(k)||sessionStorage.getItem(k);
    if(!d)return false;
    const parsed=JSON.parse(d);
    S.completed=parsed.completed||{};
    S.studentName=name;
    return true;
  }catch(e){return false;}
}

function getSavedName(){
  try{return localStorage.getItem('gept6_last_name')||'';}catch(e){return '';}
}
function saveLastName(n){try{localStorage.setItem('gept6_last_name',n);}catch(e){}}

function firstVisitBanner(){return'';}

function handleLogin(name){
  saveLastName(name);
  const loaded=loadFromStorage(name);
  if(loaded){
    render();
  } else {
    S.studentName=name;
    S.completed={};
    save();
    render();
  }
}

// ── Initialise ────────────────────────────────────────────────
(function init(){
  // Try URL hash first (student opened their personal link)
  if(loadFromHash()){
    saveLastName(S.studentName);
    render();
    return;
  }
  // Try last-used name from this browser
  const lastName=getSavedName();
  if(lastName&&loadFromStorage(lastName)){
    render();
    return;
  }
  // No data found → show login
  render(); // render shell first
  showNameLogin();
})();

  if(!S.studentName){
    // Just render the app wrapper shell; login modal will appear on top
    document.getElementById('root').innerHTML='<div style="height:200px"></div>';
    return;

  const r=document.getElementById('root');
  const tabs=['plan','learn','quiz','history'];

function initQuiz(){
  const item=SCHEDULE[S.currentIdx];
  if(!item){S.quizState={done:true,score:0,total:0};return;}
  let words=item.type==='day'?wordsForDay(item.day):wordsForRange(item.dayRange[0],item.dayRange[1]);
  const shuffled=[...words].sort(()=>Math.random()-0.5);
  let pool=[];
  if(item.type==='day'){
    const useMatch=Math.random()<0.4;
    if(useMatch){pool=[{t:'match_group',words:shuffled.slice(0,8)},...shuffled.slice(8).map(w=>({t:'fill',word:w}))];}
    else{pool=shuffled.map(w=>({t:'fill',word:w}));}
  } else if(item.type==='review'){
    const mc=shuffled.slice(0,25).map(w=>({t:'mc',word:w,opts:makeMCOpts(w,words)}));
    const fill=shuffled.slice(25,50).map(w=>({t:'fill',word:w}));
    pool=[...mc,...fill].sort(()=>Math.random()-0.5);
  } else {
    pool=shuffled.slice(0,30).map(w=>({t:'mc',word:w,opts:makeMCOpts(w,words)}));
  }
  S.quizState={pool,cur:0,score:0,total:pool.length,done:false,matchState:null};
  initMatchIfNeeded();
}

function makeMCOpts(w,allWords){
  const others=allWords.filter(x=>x[0]!==w[0]).sort(()=>Math.random()-0.5).slice(0,3);
  return [...others,w].sort(()=>Math.random()-0.5);
}

function initMatchIfNeeded(){
  const qs=S.quizState;
  if(!qs||qs.cur>=qs.pool.length)return;
  const q=qs.pool[qs.cur];
  if(q.t==='match_group'){
    const ws=q.words;
    qs.matchState={left:ws.map(w=>w[0]),right:[...ws.map(w=>w[1])].sort(()=>Math.random()-0.5),pairs:ws.map(w=>[w[0],w[1]]),matched:[],selL:null,selR:null};
  }
}

function renderQuiz(){
  if(!S.quizState)initQuiz();
  const qs=S.quizState;
  if(!qs||qs.done)return renderQuizResult();
  if(qs.cur>=qs.pool.length){finishQuiz();return renderQuizResult();}
  const q=qs.pool[qs.cur];
  const pct=Math.round(qs.cur/qs.total*100);
  let qhtml=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="font-size:16px;font-weight:500">練習題</div><span style="font-size:12px;color:var(--color-text-secondary)">${qs.cur+1} / ${qs.total}</span></div>
  <div class="progress-bar" style="margin-bottom:1rem"><div class="progress-fill" style="width:${pct}%"></div></div>`;
  if(q.t==='fill'){
    const rawSent=SENT_MAP[q.word[0]]||genSentence(q.word[0],q.word[2]);
    const sent=rawSent.replace('___',`<u style="color:#378ADD;font-weight:500">______</u>`);
    qhtml+=`<div class="quiz-box"><span class="badge badge-day" style="margin-bottom:8px;display:inline-block">填空題</span>
    <div style="font-size:14px;line-height:1.9;margin-bottom:10px">${sent}</div>
    <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:8px">中文：${q.word[1]}（${q.word[2]}）</div>
    <input class="fill-input" id="fi" type="text" placeholder="請拼出英文單字..." autocomplete="off" />
    <div id="fr"></div></div>
    <div style="display:flex;gap:8px"><button class="btn" onclick="checkFill()">確認</button><button class="btn btn-sm" onclick="skipQ()">跳過</button></div>`;
  } else if(q.t==='mc'){
    qhtml+=`<div class="quiz-box"><span class="badge badge-review" style="margin-bottom:8px;display:inline-block">選擇題</span>
    <div style="font-size:14px;font-weight:500;margin-bottom:12px">"${q.word[0]}" 的中文意思是？</div><div id="mc-opts">`;
    q.opts.forEach((opt,i)=>{qhtml+=`<button class="mc-opt" id="mc-${i}" onclick="checkMC(${i})">${opt[1]}</button>`;});
    qhtml+=`</div><div id="mcr"></div></div>`;
  } else if(q.t==='match_group'){
    const ms=qs.matchState;
    const done=ms.matched.length,total=ms.pairs.length;
    qhtml+=`<div class="quiz-box"><span class="badge" style="background:#FBEAF0;color:#72243E;margin-bottom:8px;display:inline-block">連連看</span>
    <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:10px">${done} / ${total} 配對完成</div>
    <div class="match-grid"><div>${ms.left.map((w,i)=>{
      const matched=ms.matched.find(p=>p[0]===w),sel=ms.selL===w;
      return `<div class="${matched?'mi ok':sel?'mi sel':'mi'}" onclick="selMatch('l','${w}')">${w}</div>`;
    }).join('')}</div><div>${ms.right.map((zh,i)=>{
      const matched=ms.matched.find(p=>p[1]===zh),sel=ms.selR===zh;
      return `<div class="${matched?'mi ok':sel?'mi sel':'mi'}" onclick="selMatch('r','${encodeURIComponent(zh)}')">${zh}</div>`;
    }).join('')}</div></div>
    ${done===total?`<button class="btn btn-blue" style="margin-top:10px" onclick="finishMatch()">完成配對 →</button>`:''}
    </div>`;
  }
  return qhtml;
}

function attachQuizHandlers(){
  const fi=document.getElementById('fi');
  if(fi){fi.focus();fi.onkeydown=e=>{if(e.key==='Enter')checkFill();};}
}

function checkFill(){
  const qs=S.quizState,q=qs.pool[qs.cur];
  const fi=document.getElementById('fi'),fr=document.getElementById('fr');
  if(!fi||!fr)return;
  const ans=fi.value.trim().toLowerCase(),correct=q.word[0].toLowerCase();
  fi.disabled=true;
  if(ans===correct){fr.innerHTML=`<div class="res-ok">正確！</div>`;qs.score++;setTimeout(()=>{qs.cur++;initMatchIfNeeded();render();},800);}
  else{fr.innerHTML=`<div class="res-bad">答案是：${correct}</div>`;setTimeout(()=>{qs.cur++;initMatchIfNeeded();render();},1400);}
}

function skipQ(){S.quizState.cur++;initMatchIfNeeded();render();}

function checkMC(i){
  const qs=S.quizState,q=qs.pool[qs.cur];
  const correct=q.opts[i][0]===q.word[0];
  q.opts.forEach((_,j)=>{const el=document.getElementById('mc-'+j);if(!el)return;el.disabled=true;if(q.opts[j][0]===q.word[0])el.className='mc-opt reveal';else if(j===i&&!correct)el.className='mc-opt bad';});
  if(correct)qs.score++;
  const mcr=document.getElementById('mcr');
  if(mcr)mcr.innerHTML=correct?`<div class="res-ok">正確！</div>`:`<div class="res-bad">答案是：${q.word[1]}</div>`;
  setTimeout(()=>{qs.cur++;initMatchIfNeeded();render();},1200);
}

function selMatch(side,val){
  const qs=S.quizState,ms=qs.matchState,decoded=decodeURIComponent(val);
  if(side==='l'){if(ms.matched.find(p=>p[0]===decoded))return;ms.selL=decoded;}
  else{if(ms.matched.find(p=>p[1]===decoded))return;ms.selR=decoded;}
  if(ms.selL&&ms.selR){
    const ok=ms.pairs.find(p=>p[0]===ms.selL&&p[1]===ms.selR);
    if(ok){ms.matched.push([ms.selL,ms.selR]);qs.score++;}
    ms.selL=null;ms.selR=null;
  }
  render();
}

function finishMatch(){S.quizState.cur++;initMatchIfNeeded();render();}

function finishQuiz(){
  const qs=S.quizState;
  if(qs.done)return;
  qs.done=true;
  const item=SCHEDULE[S.currentIdx];
  if(!S.completed[S.currentIdx]){
    S.completed[S.currentIdx]={score:qs.score,total:qs.total,date:new Date().toLocaleDateString('zh-TW'),type:item.type,
      label:item.type==='day'?`Day ${item.day}`:item.type==='review'?`總複習${item.n}`:`第${item.month}月大考`};
    save();
  }
}

function autoSaveModal(){
  // Progress is now saved automatically by name — just show a toast
  save();
  const existing=document.getElementById('save-toast');
  if(existing)existing.remove();
  const toast=document.createElement('div');
  toast.id='save-toast';
  toast.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#2da44e;color:#fff;padding:10px 20px;border-radius:999px;font-size:13px;font-weight:500;z-index:9999;box-shadow:0 4px 12px rgba(0,0,0,.2);transition:opacity .4s';
  toast.textContent='✓ 進度已自動儲存';
  document.body.appendChild(toast);
  setTimeout(()=>{toast.style.opacity='0';setTimeout(()=>toast.remove(),400);},2000);
}

function renderQuizResult(){
  finishQuiz();
  const qs=S.quizState,item=SCHEDULE[S.currentIdx];
  const pct=qs.total>0?Math.round(qs.score/qs.total*100):0;
  const emoji=pct>=80?'★':pct>=60?'◎':'○';
  const msg=pct>=80?'表現優秀！':pct>=60?'不錯，繼續加油！':'再複習一次，你可以的！';
  const nextIdx=S.currentIdx+1<SCHEDULE.length?S.currentIdx+1:null;
  setTimeout(()=>autoSaveModal(),400);
  return `<div class="card" style="text-align:center;padding:2rem 1.5rem">
    <div style="font-size:36px;margin-bottom:8px">${emoji}</div>
    <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:4px">${S.completed[S.currentIdx]?.label||''} 完成</div>
    <div style="font-size:24px;font-weight:500;color:#378ADD;margin:8px 0">${qs.score} <span style="font-size:15px;color:var(--color-text-secondary)">/ ${qs.total}</span></div>
    <div style="font-size:13px;color:#2da44e;margin-bottom:1rem;font-size:12px">✓ 進度已自動儲存，下次輸入「${S.studentName}」繼續</div>
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
      <button class="btn" onclick="S.quizState=null;render()">再練一次</button>
      ${nextIdx!==null?`<button class="btn btn-blue" onclick="S.currentIdx=${nextIdx};S.quizState=null;S.tab='learn';render()">下一項 →</button>`:'<span style="font-size:13px;color:#27500A;font-weight:500">全部完成！</span>'}
    </div>
  </div>`;
}

function renderHistory(){
  const entries=Object.entries(S.completed).sort((a,b)=>Number(b[0])-Number(a[0]));
  // Backup / restore bar — always visible
  const backupBar=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:1rem;padding:10px 14px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary)">
    <div style="flex:1">
      <div style="font-size:12px;font-weight:500;color:var(--color-text-primary);margin-bottom:2px">📌 儲存個人進度書籤</div>
      <div style="font-size:11px;color:var(--color-text-secondary)">點下方按鈕取得你的專屬連結，書籤後永久保留進度</div>
    </div>
    <button class="btn btn-sm btn-blue" onclick="showBookmark()">取得我的進度連結</button>
  </div>`;
  if(!entries.length)return backupBar+`<div style="color:var(--color-text-secondary);font-size:14px;padding:0.5rem 0">尚無學習紀錄，完成練習後會自動記錄在這裡。</div>`;
  const totalScore=entries.reduce((s,[,v])=>s+v.score,0);
  const totalQ=entries.reduce((s,[,v])=>s+v.total,0);
  const avgPct=totalQ>0?Math.round(totalScore/totalQ*100):0;
  let html=backupBar+`<div class="stat-grid" style="margin-bottom:1rem">
    <div class="stat-card"><div class="stat-n">${entries.length}</div><div class="stat-l">完成次數</div></div>
    <div class="stat-card"><div class="stat-n">${totalQ}</div><div class="stat-l">總答題數</div></div>
    <div class="stat-card"><div class="stat-n">${avgPct}%</div><div class="stat-l">平均正確率</div></div>
  </div><div class="card" style="padding:0">`;
  entries.forEach(([idx,v])=>{
    const pct=v.total>0?Math.round(v.score/v.total*100):0;
    const barColor=pct>=80?'#639922':pct>=60?'#BA7517':'#E24B4A';
    const typeBadge=v.type==='day'?'badge-day':v.type==='review'?'badge-review':'badge-exam';
    html+=`<div class="hist-row">
      <span class="badge ${typeBadge}" style="min-width:60px;text-align:center">${v.label}</span>
      <div style="flex:1;padding:0 12px"><div style="height:4px;background:var(--color-background-secondary);border-radius:2px"><div style="height:100%;border-radius:2px;background:${barColor};width:${pct}%"></div></div></div>
      <span style="font-size:12px;font-weight:500;color:var(--color-text-primary);min-width:36px;text-align:right">${pct}%</span>
      <span style="font-size:11px;color:var(--color-text-secondary);min-width:40px;text-align:right">${v.score}/${v.total}</span>
      <span style="font-size:11px;color:var(--color-text-secondary);min-width:64px;text-align:right">${v.date}</span>
      <button class="btn btn-sm" onclick="goLearn(${idx})" style="margin-left:6px">複習</button>
    </div>`;
  });
  html+=`</div>`;
  return html;
}

render();
</script>
</body>
</html>
